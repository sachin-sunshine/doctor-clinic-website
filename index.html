const { useState, useEffect, useRef } = React;

/* ── useVisible hook ── */
function useVisible(threshold = 0.15) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setV(true); },
      { threshold }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
}

/* ── Counter ── */
function Counter({ to, suf = '', dur = 2000 }) {
  const [ref, visible] = useVisible(0.2);
  const [count, setCount] = useState(0);
  const started = useRef(false);

  useEffect(() => {
    if (!visible || started.current) return;
    started.current = true;
    const start = performance.now();
    const tick = (now) => {
      const progress = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setCount(Math.floor(eased * to));
      if (progress < 1) requestAnimationFrame(tick);
      else setCount(to);
    };
    requestAnimationFrame(tick);
  }, [visible, to, dur]);

  return <span ref={ref}>{count}{suf}</span>;
}

/* ── Contact / Booking ── */
function Contact() {
  const [ref, visible] = useVisible();
  const [form, setForm] = useState({ name: '', phone: '', date: '', service: '', message: '' });
  const [submitted, setSubmitted] = useState(false);

  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));
  const handleSubmit = e => { e.preventDefault(); setSubmitted(true); };

  const contactInfo = [
    { icon: '📍', label: 'Location', value: '12, Health Plaza, Connaught Place, New Delhi – 110001' },
    { icon: '📞', label: 'Phone',    value: '+91 98100 00001' },
    { icon: '✉️', label: 'Email',   value: 'drsharmaclinic@gmail.com' },
    { icon: '🕐', label: 'Hours',   value: 'Mon–Sat: 9 AM – 8 PM  |  Sun: 10 AM – 2 PM' },
  ];

  return (
    <section id="contact" className="py-24 bg-white">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

          ref={ref}

        <div className={`grid lg:grid-cols-2 gap-12 items-start transition-all duration-700 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>

          {/* Left – info */}
          <div className="space-y-5">
            {contactInfo.map((c, i) => (
              <div key={i} className="flex items-start gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                <div className="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-xl flex-shrink-0">{c.icon}</div>
                <div>
                  <div className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-1">{c.label}</div>
                  <div className="text-slate-800 font-semibold text-sm leading-relaxed">{c.value}</div>

            <div className="bg-red-50 border border-red-100 rounded-2xl p-5">

                <span className="text-2xl">🚨</span>
                <div>
                  <div className="text-red-700 font-bold text-sm">Medical Emergency?</div>
                  <div className="text-red-600/80 text-xs mt-0.5">Call <span className="font-bold">+91 98100 00001</span> immediately — we provide 24/7 emergency assistance.</div>
                </div>
              </div>
            </div>
          </div>

          {/* Right – form */}
          <div className="bg-gradient-to-br from-slate-50 to-blue-50/50 rounded-3xl p-8 border border-slate-100 shadow-sm">
            {!submitted ? (
              <>
                <h3 className="text-slate-800 font-bold text-xl mb-6">Fill the Form</h3>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-slate-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Full Name *</label>
                      <input
                        name="name" value={form.name} onChange={handleChange} required
                        placeholder="Your name"
                        className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm placeholder-slate-400 transition-all duration-200 focus:border-cyan-400"
                      />
                    </div>
                    <div>
                      <label className="block text-slate-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Phone *</label>
                      <input
                        name="phone" value={form.phone} onChange={handleChange} required type="tel"
                        placeholder="+91 XXXXX XXXXX"
                        className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm placeholder-slate-400 transition-all duration-200 focus:border-cyan-400"
                      />
                    </div>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-slate-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Preferred Date *</label>
                      <input
                        name="date" value={form.date} onChange={handleChange} required type="date"
                        className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm transition-all duration-200 focus:border-cyan-400"
                      />
                    </div>
                    <div>
                      <label className="block text-slate-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Service</label>
                      <select
                        name="service" value={form.service} onChange={handleChange}
                        className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm transition-all duration-200 focus:border-cyan-400"
                      >
                        <option value="">Select a service</option>
                        <option>General Checkup</option>
                        <option>Cardiology Checkup</option>
                        <option>Diagnostics &amp; Labs</option>
                        <option>Pediatric Care</option>
                        <option>Mental Wellness</option>
                        <option>Preventive Medicine</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-slate-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Message</label>
                    <textarea
                      name="message" value={form.message} onChange={handleChange} rows={3}
                      placeholder="Briefly describe your symptoms or reason for visit…"
                      className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm placeholder-slate-400 resize-none transition-all duration-200 focus:border-cyan-400"
                    />
                  </div>
                  <button
                    type="submit"
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-blue-600/30 hover:-translate-y-0.5 hover:shadow-blue-600/50"
                  >
                    Book Appointment →
                  </button>
                  <p className="text-slate-400 text-xs text-center">We respect your privacy. Your data is never shared.</p>
                </form>
              </>
            ) : (
              <div className="text-center py-8">
                <div className="text-6xl mb-5">✅</div>
                <h3 className="text-slate-800 font-bold text-2xl mb-3">Appointment Requested!</h3>
                <p className="text-slate-500 text-sm leading-relaxed mb-6">
                  Thank you, <span className="font-semibold text-blue-600">{form.name || 'there'}</span>!<br />
                  We'll confirm your appointment within <span className="font-bold text-slate-700">2 hours</span> via call or SMS.
                </p>
                <div className="bg-blue-50 rounded-2xl p-4 text-sm text-slate-600 mb-6">
                  {form.date    && <div><span className="font-medium">📅 Date:</span> {form.date}</div>}
                  {form.service && <div className="mt-1"><span className="font-medium">🩺 Service:</span> {form.service}</div>}
                </div>
                <button
                  onClick={() => { setSubmitted(false); setForm({ name:'', phone:'', date:'', service:'', message:'' }); }}
                  className="text-blue-600 font-semibold text-sm hover:text-blue-700 hover:underline"
                >
                  Book another →
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}
